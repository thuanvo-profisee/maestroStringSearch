<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maestro Strings Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Maestro Strings Search</h1>
            <p>Search keys by value in window.maestroStrings</p>
        </div>

        <div class="search-container">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search by value..." autofocus>
        </div>

        <button id="searchButton">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.35-4.35"/>
            </svg>
            Search
        </button>

        <div class="divider"></div>

        <div class="results-header">
            <h2>Results</h2>
            <span id="resultsCount">0 found</span>
        </div>

        <div id="results">
            <div class="message">
                <div class="message-icon">🔍</div>
                <p>Enter a search term to find matching keys</p>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
